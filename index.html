<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #0f0a14; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        #intro-screen { display: flex; flex-direction: column; align-items: center; }
        #intro-btn { padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 20px; border: none; background: #e91e63; color: white; }
        #main-content { display: none; text-align: center; }
        .grid-container { display: grid; grid-template-columns: 1fr auto 1fr; gap: 40px; align-items: center; }
        .envelope { width: 200px; animation: float 3s ease-in-out infinite; }
        .center-bouquet { width: 180px; height: 180px; border-radius: 50%; border: 4px solid #ff80ab; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1>Welcome</h1>
        <button id="intro-btn">Click to Open</button>
    </div>

    <div id="main-content">
        <h1>Happy 6-Month Monthsary! ❤️</h1>
        <div class="grid-container">
            <div>
                <img src="Image 1.jpeg" class="envelope"><br>
                <img src="Image 1.jpeg" class="envelope"><br>
                <img src="Image 1.jpeg" class="envelope">
            </div>
            <div>
                <img src="Image.jpeg" class="center-bouquet">
            </div>
            <div>
                <img src="Image 1.jpeg" class="envelope"><br>
                <img src="Image 1.jpeg" class="envelope"><br>
                <img src="Image 1.jpeg" class="envelope">
            </div>
        </div>
    </div>

    <script>
        document.getElementById('intro-btn').addEventListener('click', () => {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        });
    </script>
</body>
</html>
